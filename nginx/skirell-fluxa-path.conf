location ~ ^/fluxa(?:/([^/]+))?$ {
	limit_except GET {
		deny all;
	}

    rewrite ^/fluxa(?:/([^/]+))?$ /fluxa?id=$1 break;

	fastcgi_param SCRIPT_FILENAME /usr/lib/cgi-bin/skirell-fluxa.py;
	fastcgi_param SCRIPT_NAME skirell-fluxa.py;
	fastcgi_param QUERY_STRING $query_string;

	fastcgi_pass unix:/var/run/fcgiwrap.socket;
	fastcgi_request_buffering off;
}